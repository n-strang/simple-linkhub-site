<!DOCTYPE html>
<html lang="en">
<head>
    <title>Nates Portal</title>
    <style>
        /* Reset default margins and paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Full-screen container */
        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('https://pixeljoint.com/files/icons/full/gamemockup_animation2_1.gif') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            text-align: center;
        }

        /* Overlay to make text readable over background */
        .overlay {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 10px;
        }
		
		/* Spacing between heading and paragraph */
        .overlay h1 {
            margin-bottom: 20px; 
        }

        .overlay p {
            margin-top: 0;
            margin-bottom: 25px; 
        }

        /* Style for the icons container */
        .icons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 30px; /* space between icons */
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Icon styles */
        .icons a {
            display: inline-block;
            transition: transform 0.3s;
        }

        .icons a:hover {
            transform: scale(1.2);
        }
		
		/* Adjust icon size */
        .icons img {
            width: 50px; 
            height: 50px;
            margin-bottom: 5px;
			filter: invert(100%);
        }

        /* Text under icons */
        .icons span {
            font-size: 14px;
            margin-top: 5px;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="overlay">
        <h1>Click the icons below to visit my links</h1>
        <p>Contact me! nathanstrang3@gmail.com</p>
        <div class="icons">
            <div class="icon">
                <a href="https://www.linkedin.com/in/nathan-strang-3686a4369/" target="_blank">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg" alt="LinkedIn">
                </a>
                <span>LinkedIn</span>
            </div>
            <div class="icon">
                <a href="https://github.com/n-strang" target="_blank">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub">
                </a>
                <span>GitHub</span>
            </div>
            <div class="icon">
                <a href="https://www.dropbox.com/scl/fi/i6rqc2giqxlr5dirsnge0/Nathan_Strang_Resume.pdf?rlkey=2ywk9uwd9z5p8okky8a2wowl0&st=id3coata&dl=0" target="_blank">
                    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/adobeacrobatreader.svg" alt="Resume">
                </a>
                <span>Resume</span>
            </div>
        </div>
    </div>
</body>
</html>
